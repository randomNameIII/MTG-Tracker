<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTG Life Tracker</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel to translate JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Prevent pull-to-refresh on mobile */
        body { overscroll-behavior-y: contain; }
    </style>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Inline Icons (Replaces lucide-react) ---
        const Icon = ({ size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Skull = (p) => <Icon {...p}><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></Icon>;
        const Dices = (p) => <Icon {...p}><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/></Icon>;
        const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const Plus = (p) => <Icon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
        const Minus = (p) => <Icon {...p}><path d="M5 12h14"/></Icon>;
        const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const ChevronUp = (p) => <Icon {...p}><path d="m18 15-6-6-6 6"/></Icon>;
        const ChevronDown = (p) => <Icon {...p}><path d="m6 9 6 6 6-6"/></Icon>;
        const Coins = (p) => <Icon {...p}><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;

        // --- Constants & Defaults ---
        const COLORS = [
          { name: 'White', bg: 'bg-slate-100', text: 'text-slate-800', border: 'border-slate-300' },
          { name: 'Blue', bg: 'bg-blue-600', text: 'text-white', border: 'border-blue-500' },
          { name: 'Black', bg: 'bg-zinc-800', text: 'text-white', border: 'border-zinc-700' },
          { name: 'Red', bg: 'bg-rose-600', text: 'text-white', border: 'border-rose-500' },
          { name: 'Green', bg: 'bg-emerald-600', text: 'text-white', border: 'border-emerald-500' },
          { name: 'Gold', bg: 'bg-amber-500', text: 'text-amber-950', border: 'border-amber-400' },
          { name: 'Purple', bg: 'bg-purple-600', text: 'text-white', border: 'border-purple-500' },
          { name: 'Pink', bg: 'bg-pink-500', text: 'text-white', border: 'border-pink-400' },
        ];

        const DEFAULT_STARTING_LIFE = 40;

        const createPlayer = (id, colorIndex) => ({
          id,
          color: COLORS[colorIndex % COLORS.length],
          life: DEFAULT_STARTING_LIFE,
          poison: 0,
          cmdrDmg: {}, 
        });

        // --- Custom Hook for Hold-To-Adjust Logic ---
        function useHoldButton(onAction) {
          const timerRef = useRef(null);
          const intervalRef = useRef(null);
          const ticks = useRef(0);

          const start = (e, amount) => {
            if (e && e.preventDefault) e.preventDefault(); 
            onAction(amount); 
            ticks.current = 0;

            timerRef.current = setTimeout(() => {
              onAction(amount * 4); 
              ticks.current++;

              intervalRef.current = setInterval(() => {
                ticks.current++;
                let step = 5;
                if (ticks.current > 4) step = 10; 
                onAction(amount > 0 ? step : -step);
              }, 400); 
            }, 500); 
          };

          const stop = (e) => {
            if (e && e.preventDefault) e.preventDefault();
            clearTimeout(timerRef.current);
            clearInterval(intervalRef.current);
          };

          return { start, stop };
        }

        // --- Main Application ---
        function App() {
          const [numPlayers, setNumPlayers] = useState(4);
          const [startingLife, setStartingLife] = useState(DEFAULT_STARTING_LIFE);
          const [players, setPlayers] = useState(() => 
            Array.from({ length: 4 }, (_, i) => createPlayer(i + 1, i + 1))
          );
          
          const [centerMenuOpen, setCenterMenuOpen] = useState(false);
          const [diceResult, setDiceResult] = useState(null);
          const [firstPlayerResult, setFirstPlayerResult] = useState(null);

          const updatePlayer = (id, field, updater) => {
            setPlayers(prev => prev.map(p => {
              if (p.id !== id) return p;
              const newValue = typeof updater === 'function' ? updater(p[field]) : updater;
              return { ...p, [field]: newValue };
            }));
          };

          const updateCmdrDmg = (targetPlayerId, sourcePlayerId, amount) => {
            setPlayers(prev => prev.map(p => {
              if (p.id !== targetPlayerId) return p;
              const currentDmg = p.cmdrDmg[sourcePlayerId] || 0;
              const newDmg = Math.max(0, currentDmg + amount); 
              const actualDiff = newDmg - currentDmg; 
              const newLife = p.life - actualDiff;
              return { ...p, life: newLife, cmdrDmg: { ...p.cmdrDmg, [sourcePlayerId]: newDmg } };
            }));
          };

          const resetGame = (keepColors = true, overrideStartingLife = startingLife) => {
            setPlayers(prev => Array.from({ length: numPlayers }, (_, i) => {
              const existingPlayer = prev[i];
              return {
                id: i + 1,
                color: (keepColors && existingPlayer) ? existingPlayer.color : COLORS[(i + 1) % COLORS.length],
                life: overrideStartingLife,
                poison: 0,
                cmdrDmg: {}
              };
            }));
            setCenterMenuOpen(false);
            setDiceResult(null);
            setFirstPlayerResult(null);
          };

          const changePlayerCount = (count) => {
            setNumPlayers(count);
            setPlayers(prev => {
              const newPlayers = [];
              for (let i = 0; i < count; i++) {
                newPlayers.push(prev[i] || createPlayer(i + 1, i + 1));
              }
              return newPlayers;
            });
            setCenterMenuOpen(false);
          };

          const rollDice = (sides) => {
            const result = Math.floor(Math.random() * sides) + 1;
            setDiceResult({ type: `D${sides}`, value: result });
          };

          const flipCoin = () => {
            const result = Math.random() < 0.5 ? 'Heads' : 'Tails';
            setDiceResult({ type: 'Coin', value: result });
          };

          const pickFirstPlayer = () => {
            const randomId = Math.floor(Math.random() * numPlayers) + 1;
            setFirstPlayerResult(players.find(p => p.id === randomId));
            setCenterMenuOpen(false);
          };

          const getGridClass = () => {
            if (numPlayers === 1) return "grid-cols-1 grid-rows-1";
            if (numPlayers === 2) return "grid-cols-1 grid-rows-2";
            if (numPlayers === 3) return "grid-cols-2 grid-rows-2"; 
            if (numPlayers === 4) return "grid-cols-2 grid-rows-2";
            if (numPlayers === 5) return "grid-cols-3 grid-rows-2"; 
            return "grid-cols-2 grid-rows-2";
          };

          return (
            <div className="h-screen w-screen bg-black overflow-hidden select-none font-sans text-white relative flex flex-col">
              <div className={`flex-1 grid ${getGridClass()} gap-1 p-1`}>
                {players.map((player, index) => {
                  let rotationClass = "";
                  let spanClass = "";

                  if (numPlayers === 2 && index === 0) rotationClass = "rotate-180";
                  if (numPlayers >= 3 && numPlayers < 5 && index < 2) rotationClass = "rotate-180";
                  
                  if (numPlayers === 3 && index === 2) spanClass = "col-span-2";
                  if (numPlayers === 5) {
                    if (index === 0) { spanClass = "col-start-1 row-start-1"; rotationClass = "rotate-180"; } 
                    if (index === 1) { spanClass = "col-start-2 row-start-1"; rotationClass = "rotate-180"; } 
                    if (index === 2) { spanClass = "col-start-1 row-start-2"; rotationClass = "rotate-0"; }   
                    if (index === 3) { spanClass = "col-start-2 row-start-2"; rotationClass = "rotate-0"; }   
                    if (index === 4) { spanClass = "col-start-3 row-start-1 row-span-2"; rotationClass = "rotate-0"; } 
                  }

                  return (
                    <PlayerPane 
                      key={player.id} player={player} allPlayers={players}
                      rotationClass={rotationClass} spanClass={spanClass}
                      onUpdate={(field, val) => updatePlayer(player.id, field, val)}
                      onUpdateCmdrDmg={(src, amt) => updateCmdrDmg(player.id, src, amt)}
                    />
                  );
                })}
              </div>

              <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-40">
                <button 
                  onClick={() => setCenterMenuOpen(!centerMenuOpen)}
                  className="bg-zinc-900 border-4 border-black p-3 rounded-full shadow-2xl transition-transform active:scale-90"
                >
                  <Settings size={28} className="text-zinc-400" />
                </button>
              </div>

              {centerMenuOpen && (
                <div className="absolute inset-0 z-50 bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setCenterMenuOpen(false)}>
                  <div className="bg-zinc-900 border border-zinc-700 rounded-3xl p-6 max-w-sm w-full space-y-6 shadow-2xl" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center mb-2">
                      <h2 className="text-xl font-bold text-white flex items-center gap-2">
                        <Settings size={20}/> Game Settings
                      </h2>
                      <button onClick={() => setCenterMenuOpen(false)} className="p-2 text-zinc-400 hover:text-white"><X size={24} /></button>
                    </div>

                    <div className="grid grid-cols-2 gap-2">
                      <button onClick={() => rollDice(6)} className="bg-zinc-800 p-3 rounded-xl flex flex-col items-center gap-1 active:bg-zinc-700">
                        <Dices size={20} /> <span className="text-xs font-semibold">D6</span>
                      </button>
                      <button onClick={() => rollDice(20)} className="bg-zinc-800 p-3 rounded-xl flex flex-col items-center gap-1 active:bg-zinc-700">
                        <Dices size={20} className="text-blue-400" /> <span className="text-xs font-semibold">D20</span>
                      </button>
                      <button onClick={flipCoin} className="bg-zinc-800 p-3 rounded-xl flex flex-col items-center gap-1 active:bg-zinc-700">
                        <Coins size={20} className="text-amber-400" /> <span className="text-xs font-semibold">Coin</span>
                      </button>
                      <button onClick={pickFirstPlayer} className="bg-indigo-600/20 text-indigo-400 p-3 rounded-xl flex flex-col items-center gap-1 active:bg-indigo-600/40">
                        <Users size={20} /> <span className="text-xs font-semibold">First Player</span>
                      </button>
                    </div>

                    <div className="space-y-1">
                      <p className="text-xs text-zinc-400 font-medium ml-1">Number of Players</p>
                      <div className="flex bg-zinc-800 rounded-xl overflow-hidden">
                        {[1, 2, 3, 4, 5].map(n => (
                          <button key={n} onClick={() => changePlayerCount(n)} className={`flex-1 py-2.5 font-bold transition-colors ${numPlayers === n ? 'bg-blue-600 text-white' : 'text-zinc-400 hover:bg-zinc-700'}`}>{n}</button>
                        ))}
                      </div>
                    </div>

                    <div className="space-y-1">
                      <p className="text-xs text-zinc-400 font-medium ml-1">Starting Life</p>
                      <div className="flex bg-zinc-800 rounded-xl overflow-hidden">
                        {[20, 30, 40].map(l => (
                          <button key={l} onClick={() => { setStartingLife(l); resetGame(true, l); }} className={`flex-1 py-2.5 font-bold transition-colors ${startingLife === l ? 'bg-rose-600 text-white' : 'text-zinc-400 hover:bg-zinc-700'}`}>{l}</button>
                        ))}
                      </div>
                    </div>

                    <button onClick={() => resetGame(true)} className="w-full bg-rose-600/20 text-rose-500 py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 active:bg-rose-600/40">
                      <RotateCcw size={18} /> Reset Game
                    </button>
                  </div>
                </div>
              )}

              {diceResult && (
                <div className="absolute inset-0 z-[60] flex items-center justify-center bg-black/70 backdrop-blur-md" onClick={() => setDiceResult(null)}>
                  <div className="bg-zinc-900 border border-zinc-700 rounded-3xl p-10 flex flex-col items-center shadow-2xl transition-transform scale-100">
                    <h3 className="text-zinc-400 mb-2 font-medium">{diceResult.type} Result</h3>
                    <div className="text-8xl font-black text-white">{diceResult.value}</div>
                    <p className="text-zinc-500 mt-6 text-sm">Tap anywhere to close</p>
                  </div>
                </div>
              )}

              {firstPlayerResult && (
                <div className="absolute inset-0 z-[60] flex items-center justify-center bg-black/70 backdrop-blur-md" onClick={() => setFirstPlayerResult(null)}>
                  <div className={`rounded-3xl p-10 flex flex-col items-center shadow-2xl transition-transform scale-100 ${firstPlayerResult.color.bg} ${firstPlayerResult.color.text}`}>
                    <h3 className="mb-2 font-medium opacity-80 text-xl tracking-wide uppercase">First Player</h3>
                    <div className="text-6xl font-black text-center my-4">Player {firstPlayerResult.id}</div>
                    <p className="opacity-60 mt-4 text-sm font-medium">Tap anywhere to close</p>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function PlayerPane({ player, allPlayers, rotationClass, spanClass, onUpdate, onUpdateCmdrDmg }) {
          const [isMenuOpen, setMenuOpen] = useState(false);
          const [lifeDelta, setLifeDelta] = useState(0);
          const [showDelta, setShowDelta] = useState(false);
          const prevLifeRef = useRef(player.life);
          const deltaTimerRef = useRef(null);

          useEffect(() => {
            const diff = player.life - prevLifeRef.current;
            if (diff !== 0) {
              setLifeDelta(prev => prev + diff);
              setShowDelta(true);
              clearTimeout(deltaTimerRef.current);
              deltaTimerRef.current = setTimeout(() => {
                setShowDelta(false);
                setTimeout(() => setLifeDelta(0), 300); 
              }, 1500);
              prevLifeRef.current = player.life;
            }
          }, [player.life]);
          
          const isDead = player.life <= 0 || player.poison >= 10 || Object.values(player.cmdrDmg).some(dmg => dmg >= 21);
          const adjustLife = (amount) => onUpdate('life', prev => prev + amount);

          const minusHold = useHoldButton(adjustLife);
          const plusHold = useHoldButton(adjustLife);

          return (
            <div className={`relative flex flex-col rounded-2xl overflow-hidden ${player.color.bg} ${player.color.text} ${spanClass} ${rotationClass} transition-colors duration-300 touch-manipulation`}>
              {isDead && (
                <div className="absolute inset-0 bg-black/60 z-10 flex items-center justify-center pointer-events-none">
                  <Skull size={100} className="text-red-500 opacity-60 drop-shadow-2xl" />
                </div>
              )}

              <div className="flex-1 flex relative">
                <button className="flex-1 flex items-center justify-start pl-8 active:bg-black/20 z-0 transition-colors focus:outline-none" onPointerDown={(e) => minusHold.start(e, -1)} onPointerUp={minusHold.stop} onPointerLeave={minusHold.stop} onContextMenu={(e) => e.preventDefault()}>
                  <Minus size={48} className="opacity-30" />
                </button>

                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                  <div className={`absolute top-24 sm:top-28 text-3xl font-black px-4 py-1.5 rounded-full shadow-lg backdrop-blur-md bg-black/40 transition-all duration-300 z-10 ${showDelta ? 'opacity-100 scale-100 translate-y-0' : 'opacity-0 scale-90 translate-y-4'} ${lifeDelta > 0 ? 'text-green-400' : 'text-red-400'}`}>
                    {lifeDelta > 0 ? `+${lifeDelta}` : lifeDelta}
                  </div>
                  <span className="text-[25vw] sm:text-9xl font-black tracking-tighter drop-shadow-md leading-none mt-4">{player.life}</span>
                </div>

                <button className="flex-1 flex items-center justify-end pr-8 active:bg-white/20 z-0 transition-colors focus:outline-none" onPointerDown={(e) => plusHold.start(e, 1)} onPointerUp={plusHold.stop} onPointerLeave={plusHold.stop} onContextMenu={(e) => e.preventDefault()}>
                  <Plus size={48} className="opacity-30" />
                </button>
              </div>

              <div className="absolute top-0 left-0 right-0 h-24 flex items-start justify-center z-40 pt-8 bg-gradient-to-b from-black/50 to-transparent pointer-events-none">
                <button className="p-2.5 rounded-full bg-black/40 backdrop-blur-md pointer-events-auto active:scale-95 transition-transform shadow-md border border-white/10" onClick={() => setMenuOpen(!isMenuOpen)}>
                  {isMenuOpen ? <ChevronUp size={28} className="opacity-90 text-white" /> : <ChevronDown size={28} className="opacity-90 text-white" />}
                </button>
              </div>

              {isMenuOpen && (
                <div className="absolute inset-0 z-30 bg-black/95 p-3 pt-24 flex flex-col pointer-events-auto shadow-inner">
                  <div className="flex justify-between items-center mb-2 pb-1 border-b border-white/10 shrink-0">
                    <h3 className="font-bold text-sm flex items-center gap-2 text-white">
                      <div className={`w-3 h-3 rounded-full ${player.color.bg} border ${player.color.border}`}></div>
                      Player {player.id} Menu
                    </h3>
                  </div>

                  <div className="flex-1 flex gap-2 overflow-hidden">
                    <div className="flex-[1.5] bg-white/5 rounded-lg p-2 flex flex-col">
                      <span className="text-[10px] uppercase font-bold text-white/50 mb-1.5 tracking-wider">Cmdr Dmg</span>
                      <div className="grid grid-cols-2 gap-1.5 overflow-y-auto content-start">
                        {allPlayers.filter(p => p.id !== player.id).map(opp => (
                          <div key={opp.id} className={`relative flex items-center justify-center rounded-md ${opp.color.bg} ${opp.color.text} min-h-[3rem] select-none overflow-hidden shadow-inner`}>
                            <button className="absolute left-0 top-0 bottom-0 w-1/2 active:bg-black/20 z-10" onPointerDown={(e) => { e.preventDefault(); onUpdateCmdrDmg(opp.id, -1); }} onContextMenu={e => e.preventDefault()} />
                            <span className="absolute top-0.5 left-1.5 text-[9px] opacity-70 font-bold uppercase">P{opp.id}</span>
                            <span className="text-xl font-bold z-0">{player.cmdrDmg[opp.id] || 0}</span>
                            <button className="absolute right-0 top-0 bottom-0 w-1/2 active:bg-white/20 z-10" onPointerDown={(e) => { e.preventDefault(); onUpdateCmdrDmg(opp.id, 1); }} onContextMenu={e => e.preventDefault()} />
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="flex-1 flex flex-col gap-2">
                      <div className="relative flex items-center justify-center rounded-lg bg-green-900/60 text-green-400 border border-green-800/50 min-h-[3rem] shrink-0 select-none">
                         <button className="absolute left-0 top-0 bottom-0 w-1/2 active:bg-black/30 z-10" onPointerDown={e => {e.preventDefault(); onUpdate('poison', prev => Math.max(0, prev - 1))}} onContextMenu={e => e.preventDefault()} />
                         <Skull size={12} className="absolute top-1 left-1.5 opacity-60"/>
                         <span className="text-xl font-bold z-0">{player.poison}</span>
                         <button className="absolute right-0 top-0 bottom-0 w-1/2 active:bg-white/10 z-10" onPointerDown={e => {e.preventDefault(); onUpdate('poison', prev => prev + 1)}} onContextMenu={e => e.preventDefault()} />
                      </div>

                      <div className="bg-white/5 rounded-lg p-2 flex-1 flex flex-col min-h-0">
                        <span className="text-[10px] uppercase font-bold text-white/50 mb-1.5 tracking-wider shrink-0">Color</span>
                        <div className="flex flex-wrap gap-1.5 justify-start content-start overflow-y-auto">
                          {COLORS.map(c => (
                            <button key={c.name} onClick={() => onUpdate('color', c)} className={`w-6 h-6 rounded-full ${c.bg} border-[1.5px] ${player.color.name === c.name ? 'border-white scale-110 shadow-md' : 'border-transparent opacity-50'}`} />
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
